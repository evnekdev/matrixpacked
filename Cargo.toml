[package]
name = "matrixpacked"
version = "0.1.0"
edition = "2024"

[dependencies]
num-complex = "0.4"
num-traits  = "0.2"
lapack      = "0.20"
blas        = "0.23"

[features]
default = []
openblas-static = ["dep:openblas-src"]

[dependencies.openblas-src]
version = "0.10"
optional = true
features = ["static", "cblas"]
