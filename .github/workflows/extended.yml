name: Extended numerical stress

on:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extended-openblas:
    name: Extended stress (Linux / OpenBLAS)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RUSTFLAGS: -lopenblas
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system OpenBLAS
        run: sudo apt-get update && sudo apt-get install --yes libopenblas-dev
      - name: Run deterministic extended stress tests
        env:
          MATRIXPACKED_EXTENDED_TESTS: "1"
          MATRIXPACKED_PROPTEST_SEED: "557075679"
        run: cargo test --test nalgebra_oracle extended_property -- --nocapture
      - name: Run every example
        run: |
          sh scripts_run_nonlapack_examples.sh
          sh scripts_run_lapack_examples.sh
