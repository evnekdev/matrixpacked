name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  formatting:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  nalgebra-interop-quality:
    name: Nalgebra interop and feature isolation
    runs-on: ubuntu-latest
    env:
      MATRIXPACKED_PROPTEST_CASES: "16"
      MATRIXPACKED_PROPTEST_SEED: "557075679"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system OpenBLAS
        run: sudo apt-get update && sudo apt-get install --yes libopenblas-dev
      - name: Check provider-free library without warnings
        env:
          RUSTFLAGS: -D warnings
        run: cargo check --lib --no-default-features
      - name: Test without optional features
        env:
          RUSTFLAGS: -lopenblas
        run: cargo test --no-default-features
      - name: Check all targets and nalgebra interoperability without warnings
        env:
          RUSTFLAGS: -D warnings
        run: cargo check --all-targets --features nalgebra-interop
      - name: Check simultaneous provider feature resolution
        run: cargo metadata --format-version 1 --no-deps --features openblas-static,intel-mkl-static > /dev/null
      - name: Test nalgebra interoperability
        env:
          RUSTFLAGS: -lopenblas
        run: cargo test --features nalgebra-interop
      - name: Lint nalgebra interoperability
        run: cargo clippy --all-targets --features nalgebra-interop -- -D warnings
      - name: Build warning-free nalgebra documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --features nalgebra-interop
      - name: Run nalgebra doctests
        env:
          RUSTFLAGS: -lopenblas
        run: cargo test --doc --features nalgebra-interop
      - name: Run representative examples
        env:
          RUSTFLAGS: -lopenblas
        run: |
          cargo run --example nonlapack_spd
          cargo run --example lapack_lower_f64_tpmv
          cargo run --example nalgebra_spd_conversion --features nalgebra-interop

  package:
    name: Package contents and verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: List package contents
        run: cargo package --list
      - name: Build package from its staged contents
        run: cargo package

  fast-linux:
    name: Fast tests (Linux / OpenBLAS)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -lopenblas
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system OpenBLAS
        run: sudo apt-get update && sudo apt-get install --yes libopenblas-dev
      - name: Run ordinary and fast deterministic tests
        env:
          MATRIXPACKED_PROPTEST_CASES: "16"
          MATRIXPACKED_PROPTEST_SEED: "557075679"
        run: cargo test --all-targets

  property-linux:
    name: Property tests (Linux / OpenBLAS)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -lopenblas
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system OpenBLAS
        run: sudo apt-get update && sudo apt-get install --yes libopenblas-dev
      - name: Run reproducible property suite
        env:
          MATRIXPACKED_PROPTEST_CASES: "96"
          MATRIXPACKED_PROPTEST_SEED: "557075679"
        run: cargo test --test nalgebra_oracle property

  backend-smoke-windows:
    name: Backend smoke (Windows / MKL)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run library tests
        run: cargo test --lib --features intel-mkl-static
      - name: Run deterministic numerical oracle smoke suite
        run: cargo test --test nalgebra_oracle --features intel-mkl-static -- --skip property
